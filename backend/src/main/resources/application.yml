server:
  port: 8080
  tomcat:
    threads:
      max: 50
      min-spare: 10
    accept-count: 100

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/airesumeinsight?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: "1125"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 200MB

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: llama3.1
          temperature: 0.1

# CORS config 
cors:
  allowed-origins: http://localhost:5173
